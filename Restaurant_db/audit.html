<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audit Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <span class="brand">Restaurant DB</span>
    <a href="index.html">Home</a>
    <a href="tables.html">Tables</a>
    <a href="menu.html">Menu</a>
    <a href="reserve.html">Reserve</a>
    <a href="orders.html">Orders</a>
    <a href="audit.html">Audit Log</a>
  </nav>
  <main>
    <h2>Audit Log</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Table</th><th>Operation</th><th>Record ID</th><th>By</th><th>When</th></tr>
      </thead>
      <tbody id="audit-body">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    fetch("/api/audit")
      .then(res => res.json())
      .then(rows => {
        const body = document.getElementById("audit-body");
        body.innerHTML = "";
        rows.forEach(row => {
          const [id, tableName, operation, recordId, actionBy, actionDate] = row;
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${id}</td>
            <td>${tableName}</td>
            <td>${operation}</td>
            <td>${recordId}</td>
            <td>${actionBy}</td>
            <td>${actionDate}</td>
          `;
          body.appendChild(tr);
        });
      })
      .catch(err => {
        document.getElementById("audit-body").innerHTML =
          `<tr><td colspan="6">Error loading audit log: ${err.message}</td></tr>`;
      });
  </script>
</body>
</html>
